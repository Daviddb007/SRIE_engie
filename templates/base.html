<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Stonelytics — Sistemas Digitales{% endblock %}</title>
  <meta name="description" content="{% block description %}Stonelytics diseña, implementa y administra Sistemas Digitales que evolucionan junto con el crecimiento de cada empresa.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Stonelytics — Sistemas Digitales{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Sistemas Digitales para empresas que quieren crecer.{% endblock %}">
  <meta property="og:image" content="https://stonelytics.tech/static/img/Stonelytics_logo.jpeg">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"></noscript>
  <link rel="preload" href="/static/css/tokens.css" as="style">
  <link rel="preload" href="/static/css/base.css" as="style">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block extra_css %}{% endblock %}
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    h1, h2, h3, h4 { font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
  <script src="/static/js/icons.js" defer></script>
</body>
</html>
